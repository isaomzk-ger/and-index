<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>and° 社内インデックス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 220px;
  --header-h: 52px;
  --bg: #f2f2f5;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.14);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #b0b0b5;
  --sidebar-bg: #1d1d1f;
  --sidebar-text: rgba(255,255,255,0.55);
  --sidebar-active: #ffffff;
  --sidebar-active-bg: rgba(255,255,255,0.1);

  /* カテゴリカラー */
  --c-org: #7c5cfc;
  --c-org-bg: #f3f0ff;
  --c-org-light: #ede8ff;
  --c-info: #0a84ff;
  --c-info-bg: #e8f2ff;
  --c-info-light: #dceeff;
  --c-learn: #30b050;
  --c-learn-bg: #e6f7ec;
  --c-learn-light: #d4f0dc;
  --c-tool: #f59e0b;
  --c-tool-bg: #fef8e7;
  --c-tool-light: #fef0c7;
  --c-mgmt: #ef4444;
  --c-mgmt-bg: #fef0f0;
  --c-mgmt-light: #fde0e0;
}

body {
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── LAYOUT ─── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  z-index: 200;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 1.5rem 1.4rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sidebar-logo .brand {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
}

.sidebar-logo .brand-sub {
  font-size: 11px;
  color: var(--sidebar-text);
  margin-top: 2px;
  font-weight: 300;
}

.sidebar-section {
  padding: 1.2rem 1rem .5rem;
}

.sidebar-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 0 .4rem;
  margin-bottom: .5rem;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .55rem .8rem;
  border-radius: 9px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 13px;
  font-weight: 400;
  transition: all .15s;
  margin-bottom: 2px;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }

.nav-item.active {
  background: var(--sidebar-active-bg);
  color: var(--sidebar-active);
  font-weight: 500;
}

.nav-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.nav-count {
  margin-left: auto;
  font-size: 10px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  padding: 1px 6px;
  border-radius: 10px;
}

.nav-item.active .nav-count {
  background: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
}

.sidebar-footer {
  margin-top: auto;
  padding: 1rem 1.4rem;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  font-weight: 300;
}

/* ─── MAIN ─── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
}

/* ─── HERO ─── */
.hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  padding: 2.5rem 2.5rem 2rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: .5rem;
}

.hero-title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
  margin-bottom: .4rem;
  line-height: 1.2;
}

.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  margin-bottom: 1.5rem;
}

.hero-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-decoration: none;
  transition: background .2s, border-color .2s, transform .2s;
  backdrop-filter: blur(10px);
  max-width: 600px;
}

.hero-card:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.hero-card-left { display: flex; align-items: center; gap: 1rem; }

.hero-card-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #ff4444, #ff6b35);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

.hero-card-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-weight: 400;
  margin-bottom: 3px;
  letter-spacing: .05em;
}

.hero-card-name {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.01em;
}

.hero-card-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
  margin-top: 2px;
}

.hero-card-arrow {
  font-size: 20px;
  color: rgba(255,255,255,0.3);
}

/* ─── CONTENT ─── */
.content {
  padding: 2rem 2.5rem 4rem;
}

/* ─── SECTION ─── */
.section { margin-bottom: 2.5rem; }

.section-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1rem;
}

.section-color-bar {
  width: 4px;
  height: 20px;
  border-radius: 2px;
  flex-shrink: 0;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -.01em;
}

.section-count {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 400;
}

/* ─── LARGE CARDS ─── */
.grid-large {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 10px;
}

.card-large {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.4rem 1.5rem;
  text-decoration: none;
  display: block;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative;
  overflow: hidden;
}

.card-large::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}

.card-large:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,.09);
  border-color: var(--border-hover);
}

.card-icon {
  width: 40px; height: 40px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: .85rem;
}

.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: .3rem;
  letter-spacing: -.01em;
}

.card-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.65;
  font-weight: 300;
  margin-bottom: .85rem;
}

.card-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
}

/* ─── SMALL CARDS ─── */
.grid-small {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.card-small {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .85rem 1rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: .7rem;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}

.card-small:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,.07);
  border-color: var(--border-hover);
}

.card-icon-sm {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.card-body-sm { min-width: 0; }

.card-name-sm {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.card-desc-sm {
  font-size: 10px;
  color: var(--text-secondary);
  line-height: 1.4;
  font-weight: 300;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── HIDDEN ─── */
.section[data-hidden="true"] { display: none; }

/* ─── DETAIL LAYOUT (カテゴリ個別) ─── */
.detail-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 16px;
  height: calc(100vh - 52px - 2rem);
  min-height: 500px;
}

.detail-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  padding-right: 4px;
}

.detail-list-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .9rem 1.1rem;
  display: flex;
  align-items: center;
  gap: .75rem;
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}

.detail-list-item:hover {
  border-color: var(--border-hover);
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
}

.detail-list-item.selected {
  border-color: var(--accent-color);
  background: var(--accent-bg);
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}

.detail-list-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.detail-list-body { min-width: 0; flex: 1; }

.detail-list-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.detail-list-sub {
  font-size: 11px;
  color: var(--text-tertiary);
}

.detail-list-arrow {
  font-size: 12px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  transition: transform .15s;
}

.detail-list-item.selected .detail-list-arrow {
  transform: translateX(2px);
}

/* プレビューパネル */
.detail-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 2rem;
  height: fit-content;
  max-height: calc(100vh - 52px - 4rem);
}

.preview-header {
  padding: 2rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.preview-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-bottom: 1.2rem;
}

.preview-cat {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: .4rem;
}

.preview-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.02em;
  margin-bottom: .6rem;
  line-height: 1.2;
}

.preview-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  font-weight: 300;
}

.preview-body {
  padding: 1.5rem 2rem;
  flex: 1;
  overflow-y: auto;
}

.preview-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.preview-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
}

.preview-cta {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .75rem 1.5rem;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  transition: opacity .15s, transform .15s;
  width: 100%;
  justify-content: center;
  margin-top: .5rem;
}

.preview-cta:hover { opacity: .88; transform: translateY(-1px); }

.preview-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 300px;
  color: var(--text-tertiary);
  font-size: 13px;
  gap: .5rem;
}

.preview-empty-icon { font-size: 36px; margin-bottom: .5rem; }
</style>
</head>

  {cat:"業務ツール",name:"サムネ・企画チェックシート",desc:"サムネイル・企画チェック時に使用するシート。",target:"ディレクター",url:"https://docs.google.com/spreadsheets/d/1vb7AkFgJi9R9Yoxs99EAY0w59fNEAkCdKfZnPb0V3GE/edit?usp=sharing",icon:"✅"},
  {cat:"業務ツール",name:"ディレクター週次報告シート",desc:"毎週日曜提出。",target:"ディレクター",url:"https://docs.google.com/spreadsheets/d/1L_bBeLNUUv350Jrv9b9_siuBgQanXeleD63be9SqPAk/edit?usp=sharing",icon:"📊"},
  {cat:"業務ツール",name:"オンボーディング表",desc:"案件ごとの進行スケジュールを管理するスプレッドシート。",target:"ディレクター",url:"https://docs.google.com/spreadsheets/d/1N8njLMZce_y61srWUb79xwCipPeqQgcpzx9QxjAJBj4/edit?usp=sharing",icon:"🗓️"},
];

const catConfig = {
  "組織・理念": { color: "#7c5cfc", bg: "#f3f0ff", light: "#ede8ff", badge: "#7c5cfc" },
  "情報・連絡":  { color: "#0a84ff", bg: "#e8f2ff", light: "#dceeff", badge: "#0a84ff" },
  "学習・育成":  { color: "#30b050", bg: "#e6f7ec", light: "#d4f0dc", badge: "#30b050" },
  "業務ツール":  { color: "#f59e0b", bg: "#fef8e7", light: "#fef0c7", badge: "#d97706" },
  "案件管理":   { color: "#ef4444", bg: "#fef0f0", light: "#fde0e0", badge: "#ef4444" },
};

const catOrder = ["組織・理念","情報・連絡","学習・育成","業務ツール"];
const forceLarge = ["情報・連絡","学習・育成","業務ツール"];
let currentCat = "all";
let currentTarget = "all";

let selectedItem = null;

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  // カテゴリ個別: 左リスト + 右プレビュー
  if (currentCat !== "all") {
    const cfg = catConfig[currentCat];
    let items = data.filter(d => d.cat === currentCat);
    if (currentTarget !== "all") items = items.filter(d => d.target === currentTarget);
    if (!items.length) return;

    // 最初のアイテムを選択
    if (!selectedItem || selectedItem.cat !== currentCat) selectedItem = items[0];

    const layout = document.createElement("div");
    layout.className = "detail-layout";
    layout.style.setProperty("--accent-color", cfg.color);
    layout.style.setProperty("--accent-bg", cfg.bg);

    // 左リスト
    const list = document.createElement("div");
    list.className = "detail-list";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "detail-list-item" + (item.name === selectedItem.name ? " selected" : "");
      div.innerHTML = `
        <div class="detail-list-icon" style="background:${cfg.light}">${item.icon}</div>
        <div class="detail-list-body">
          <div class="detail-list-name">${item.name}</div>
          <div class="detail-list-sub">${item.target}</div>
        </div>
        <span class="detail-list-arrow">›</span>`;
      div.onclick = () => { selectedItem = item; render(); };
      list.appendChild(div);
    });

    // 右プレビュー
    const preview = document.createElement("div");
    preview.className = "detail-preview";
    const si = selectedItem;
    preview.innerHTML = `
      <div class="preview-header" style="background:${cfg.bg}">
        <div class="preview-icon" style="background:${cfg.light}">${si.icon}</div>
        <div class="preview-cat" style="color:${cfg.color}">${si.cat}</div>
        <div class="preview-name">${si.name}</div>
        <div class="preview-desc">${si.desc}</div>
      </div>
      <div class="preview-body">
        <div class="preview-meta-row">
          <span class="preview-badge" style="background:${cfg.color}22;color:${cfg.color}">${si.target}</span>
        </div>
        <a class="preview-cta" href="${si.url}" target="_blank" rel="noopener noreferrer"
          style="background:${cfg.color}">
          ドキュメントを開く →
        </a>
      </div>`;

    layout.appendChild(list);
    layout.appendChild(preview);
    container.appendChild(layout);
    return;
  }

  // すべて表示: 従来のグリッド
  catOrder.forEach(cat => {
    const cfg = catConfig[cat];
    let items = data.filter(d => d.cat === cat);
    if (currentTarget !== "all") items = items.filter(d => d.target === currentTarget);
    if (!items.length) return;

    const isAllLarge = forceLarge.includes(cat);
    const allItems = isAllLarge ? items : items.filter(d => d.target === "全員");
    const dirItems = isAllLarge ? [] : items.filter(d => d.target === "ディレクター");

    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-color-bar" style="background:${cfg.color}"></div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length}件</div>
      </div>`;

    if (allItems.length) {
      const gl = document.createElement("div");
      gl.className = "grid-large";
      allItems.forEach(item => {
        const a = document.createElement("a");
        a.className = "card-large";
        a.href = item.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.background = cfg.bg;
        a.style.borderColor = cfg.light;
        a.innerHTML = `
          <div class="card-icon" style="background:${cfg.light}">${item.icon}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <span class="card-badge" style="background:${cfg.color}22;color:${cfg.badge}">全員</span>`;
        gl.appendChild(a);
      });
      sec.appendChild(gl);
    }

    if (dirItems.length) {
      const gs = document.createElement("div");
      gs.className = "grid-small";
      gs.style.marginTop = allItems.length ? "8px" : "0";
      dirItems.forEach(item => {
        const a = document.createElement("a");
        a.className = "card-small";
        a.href = item.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `
          <div class="card-icon-sm" style="background:${cfg.light}">${item.icon}</div>
          <div class="card-body-sm">
            <div class="card-name-sm">${item.name}</div>
            <div class="card-desc-sm">${item.desc}</div>
          </div>`;
        gs.appendChild(a);
      });
      sec.appendChild(gs);
    }

    container.appendChild(sec);
  });
}

function filterCat(cat, el) {
  currentCat = cat;
  currentTarget = "all";
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("hero").style.display = cat === "all" ? "" : "none";
  render();
}

function filterTarget(target, el) {
  currentTarget = target;
  currentCat = "all";
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("hero").style.display = "none";
  render();
}

render();
</script>
</body>
</html>
