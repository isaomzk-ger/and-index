<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>and° 社内インデックス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 240px;
  --bg: #f2f2f5;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.14);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #b0b0b5;
  --sidebar-bg: #1d1d1f;
  --sidebar-text: rgba(255,255,255,0.55);
  --sidebar-active: #ffffff;
  --sidebar-active-bg: rgba(255,255,255,0.1);
  --c-org: #7c5cfc;
  --c-info: #0a84ff;
  --c-learn: #30b050;
  --c-tool: #f59e0b;
}

body {
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  z-index: 200;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 1.5rem 1.4rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sidebar-logo .brand {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
}

.sidebar-logo .brand-sub {
  font-size: 11px;
  color: var(--sidebar-text);
  margin-top: 2px;
  font-weight: 300;
}

.sidebar-section { padding: 1.2rem 1rem .5rem; }

.sidebar-section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 0 .4rem;
  margin-bottom: .5rem;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem .9rem;
  border-radius: 10px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 14px;
  font-weight: 400;
  transition: all .15s;
  margin-bottom: 3px;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 500; }

.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.nav-count {
  margin-left: auto;
  font-size: 10px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  padding: 1px 6px;
  border-radius: 10px;
}

.nav-item.active .nav-count { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }

.sidebar-footer {
  margin-top: auto;
  padding: 1rem 1.4rem;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  font-weight: 300;
}

/* ─── MAIN ─── */
.main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; }

/* ─── HERO ─── */
.hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  padding: 2.5rem 2.5rem 2rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: .5rem;
}

.hero-title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
  margin-bottom: .4rem;
  line-height: 1.2;
}

.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  margin-bottom: 1.5rem;
}

.hero-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-decoration: none;
  transition: background .2s, border-color .2s, transform .2s;
  backdrop-filter: blur(10px);
  max-width: 600px;
}

.hero-card:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.hero-card-left { display: flex; align-items: center; gap: 1rem; }

.hero-card-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #ff4444, #ff6b35);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

.hero-card-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 3px;
  letter-spacing: .05em;
}

.hero-card-name {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.01em;
}

.hero-card-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
  margin-top: 2px;
}

.hero-card-arrow { font-size: 20px; color: rgba(255,255,255,0.3); }

/* ─── CONTENT ─── */
.content { padding: 2rem 2.5rem 4rem; }

/* ─── SECTION ─── */
.section { margin-bottom: 2.5rem; }

.section-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1rem;
}

.section-color-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }

.section-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -.01em; }

.section-count { font-size: 11px; color: var(--text-tertiary); }

/* ─── LARGE CARDS ─── */
.grid-large {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 10px;
}

.card-large {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.4rem 1.5rem;
  text-decoration: none;
  display: block;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative;
  overflow: hidden;
}

.card-large::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}

.card-large:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,.09);
  border-color: var(--border-hover);
}

.card-icon {
  width: 40px; height: 40px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: .85rem;
}

.card-name { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: .3rem; letter-spacing: -.01em; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; font-weight: 300; margin-bottom: .85rem; }

.card-badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }

/* ─── SMALL CARDS ─── */
.grid-small {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.card-small {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .85rem 1rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: .7rem;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}

.card-small:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,.07);
  border-color: var(--border-hover);
}

.card-icon-sm {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.card-body-sm { min-width: 0; }

.card-name-sm {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.card-desc-sm {
  font-size: 10px;
  color: var(--text-secondary);
  line-height: 1.4;
  font-weight: 300;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── MOBILE ─── */
.hamburger {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 500;
  width: 40px; height: 40px;
  border-radius: 10px;
  background: rgba(29,29,31,0.92);
  backdrop-filter: blur(10px);
  border: none;
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.hamburger span {
  display: block;
  width: 18px; height: 2px;
  background: #fff;
  border-radius: 2px;
  transition: all .25s;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 150;
  backdrop-filter: blur(2px);
}

@media (max-width: 768px) {
  .hamburger { display: flex; }

  .sidebar {
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 300;
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity .28s; }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }

  .main { margin-left: 0; }

  .hero {
    padding: 3.5rem 1.2rem 1.5rem;
  }

  .hero-title { font-size: 20px; }
  .hero-sub { font-size: 12px; }

  .hero-card {
    padding: 1rem 1.1rem;
    max-width: 100%;
  }

  .hero-card-name { font-size: 15px; }
  .hero-card-icon { width: 40px; height: 40px; font-size: 18px; }

  .content { padding: 1.5rem 1rem 3rem; }

  .grid-large {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .grid-small {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card-large { padding: 1.1rem 1.2rem; }
  .card-name { font-size: 14px; }
  .card-desc { font-size: 12px; }
}

@media (max-width: 400px) {
  .grid-small { grid-template-columns: 1fr; }
}

/* ─── ORG CHART MODAL ─── */
.org-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(4px);
}
.org-modal-overlay.open { opacity: 1; pointer-events: all; }

.org-modal {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: var(--sidebar-w);
  background: #f2f2f5;
  z-index: 700;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
@media (max-width: 768px) {
  .org-modal { left: 0; }
}
.org-modal.open { transform: translateY(0); }

.org-modal-header {
  background: #1d1d1f;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.org-modal-title {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.01em;
}
.org-modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.org-modal-close:hover { background: rgba(255,255,255,.2); }

.org-tabs {
  display: flex;
  gap: 4px;
  padding: .75rem 1.5rem;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07);
  overflow-x: auto;
  flex-shrink: 0;
}
.org-tab {
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,.1);
  background: transparent;
  color: #6e6e73;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.org-tab:hover { background: #f5f5f7; color: #1d1d1f; }
.org-tab.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

.org-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}

/* トップカード */
.org-top {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  border-radius: 16px;
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.org-top-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.org-top-name { font-size: 16px; font-weight: 700; color: #fff; }
.org-top-role { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }

/* 部門ヘッダー */
.org-dept-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1rem;
}
.org-dept-bar { width: 4px; height: 18px; border-radius: 2px; }
.org-dept-name { font-size: 14px; font-weight: 600; color: #1d1d1f; }

/* メンバーグリッド */
.org-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 1.5rem;
}

.org-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,.07);
  border-radius: 12px;
  padding: .8rem 1rem;
  transition: box-shadow .15s, transform .15s;
}
.org-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
.org-card.exec {
  border-left: 3px solid var(--dept-color, #7c5cfc);
}
.org-card-name { font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 3px; }
.org-card-role {
  font-size: 10px;
  color: #6e6e73;
  font-weight: 400;
  line-height: 1.4;
}
.org-card-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 10px;
  margin-top: 5px;
}

/* サブ部門 */
.org-sub-section { margin-bottom: 1.5rem; }
.org-sub-label {
  font-size: 11px;
  font-weight: 500;
  color: #aeaeb2;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: .6rem;
  padding-left: 2px;
}

/* ─── NOTICE BOARD MODAL ─── */
.notice-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(4px);
}
.notice-modal-overlay.open { opacity: 1; pointer-events: all; }

.notice-modal {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: var(--sidebar-w);
  background: #f2f2f5;
  z-index: 700;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
@media (max-width: 768px) { .notice-modal { left: 0; } }
.notice-modal.open { transform: translateY(0); }

.notice-modal-header {
  background: #1d1d1f;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.notice-modal-title { font-size: 16px; font-weight: 600; color: #fff; }
.notice-modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: none; color: #fff; font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.notice-modal-close:hover { background: rgba(255,255,255,.2); }

.notice-filter-bar {
  display: flex;
  gap: 4px;
  padding: .75rem 1.5rem;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07);
  overflow-x: auto;
  flex-shrink: 0;
}
.notice-filter-btn {
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,.1);
  background: transparent;
  color: #6e6e73;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.notice-filter-btn:hover { background: #f5f5f7; color: #1d1d1f; }
.notice-filter-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

.notice-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.notice-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,.07);
  border-radius: 14px;
  padding: 1.1rem 1.3rem;
  position: relative;
  transition: box-shadow .15s;
}
.notice-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
.notice-card.pinned {
  border-left: 3px solid #f59e0b;
  background: #fffdf5;
}

.notice-card-top {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: .5rem;
}
.notice-pin-icon { font-size: 13px; }

.notice-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}
.notice-date {
  font-size: 11px;
  color: #aeaeb2;
  margin-left: auto;
}
.notice-title {
  font-size: 14px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: .35rem;
  line-height: 1.4;
}
.notice-body-text {
  font-size: 13px;
  color: #6e6e73;
  line-height: 1.65;
  font-weight: 300;
}
</style>
</head>
<body>



<!-- NOTICE BOARD MODAL -->
<div class="notice-modal-overlay" id="noticeOverlay" onclick="closeNotice()"></div>
<div class="notice-modal" id="noticeModal">
  <div class="notice-modal-header">
    <div class="notice-modal-title">📢 お知らせ</div>
    <button class="notice-modal-close" onclick="closeNotice()">✕</button>
  </div>
  <div class="notice-filter-bar">
    <button class="notice-filter-btn active" onclick="filterNotice('all', this)">すべて</button>
    <button class="notice-filter-btn" onclick="filterNotice('重要', this)">🔴 重要</button>
    <button class="notice-filter-btn" onclick="filterNotice('業務', this)">🔵 業務</button>
    <button class="notice-filter-btn" onclick="filterNotice('その他', this)">⚪ その他</button>
  </div>
  <div class="notice-body" id="noticeBody"></div>
</div>
<!-- ORG CHART MODAL -->
<div class="org-modal-overlay" id="orgOverlay" onclick="closeOrg()"></div>
<div class="org-modal" id="orgModal">
  <div class="org-modal-header">
    <div class="org-modal-title">🏢 組織図</div>
    <button class="org-modal-close" onclick="closeOrg()">✕</button>
  </div>
  <div class="org-tabs" id="orgTabs"></div>
  <div class="org-body" id="orgBody"></div>
</div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">and°</div>
      <div class="brand-sub">社内インデックス</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">メニュー</div>
      <button class="nav-item active" onclick="filterCat('all', this)">
        <div class="nav-dot" style="background:#888"></div>
        すべて
        <span class="nav-count">13</span>
      </button>
      <button class="nav-item" onclick="filterCat('組織・理念', this)">
        <div class="nav-dot" style="background:var(--c-org)"></div>
        組織・理念
        <span class="nav-count">2</span>

const catOrder = ["組織・理念","情報・連絡","学習・育成","業務ツール"];
const forceLarge = ["情報・連絡","学習・育成","業務ツール"];
let currentCat = "all";
let currentTarget = "all";

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  catOrder.forEach(cat => {
    const cfg = catConfig[cat];
    let items = data.filter(d => d.cat === cat);
    if (currentCat !== "all" && currentCat !== cat) return;
    if (currentTarget !== "all") items = items.filter(d => d.target === currentTarget);
    if (!items.length) return;

    const isAllLarge = forceLarge.includes(cat);
    const allItems = isAllLarge ? items : items.filter(d => d.target === "全員");
    const dirItems = isAllLarge ? [] : items.filter(d => d.target === "ディレクター");

    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-color-bar" style="background:${cfg.color}"></div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length}件</div>
      </div>`;

    if (allItems.length) {
      const gl = document.createElement("div");
      gl.className = "grid-large";
      allItems.forEach(item => {
        const a = document.createElement("a");
        a.className = "card-large";
        a.style.background = cfg.bg;
        a.style.borderColor = cfg.light;
        if (item.action === "openOrg") {
          a.href = "#";
          a.onclick = (e) => { e.preventDefault(); openOrg(); };
        } else if (item.action === "openNotice") {
          a.href = "#";
          a.onclick = (e) => { e.preventDefault(); openNotice(); };
        } else {
          a.href = item.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
        }
        a.innerHTML = `
          <div class="card-icon" style="background:${cfg.light}">${item.icon}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <span class="card-badge" style="background:${cfg.color}22;color:${cfg.badge}">全員</span>`;
        gl.appendChild(a);
      });
      sec.appendChild(gl);
    }

    if (dirItems.length) {
      const gs = document.createElement("div");
      gs.className = "grid-small";
      gs.style.marginTop = allItems.length ? "8px" : "0";
      dirItems.forEach(item => {
        const a = document.createElement("a");
        a.className = "card-small";
        a.href = item.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `
          <div class="card-icon-sm" style="background:${cfg.light}">${item.icon}</div>
          <div class="card-body-sm">
            <div class="card-name-sm">${item.name}</div>
            <div class="card-desc-sm">${item.desc}</div>
          </div>`;
        gs.appendChild(a);
      });
      sec.appendChild(gs);
    }

    container.appendChild(sec);
  });
}

function filterCat(cat, el) {
  currentCat = cat;
  currentTarget = "all";
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("hero").style.display = cat === "all" ? "" : "none";
  render();
}

function filterTarget(target, el) {
  currentTarget = target;
  currentCat = "all";
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("hero").style.display = "none";
  render();
}

              ">
                <div style="font-size:12px;font-weight:500;color:#1d1d1f">${m}</div>
                <div style="font-size:10px;color:#aeaeb2;margin-top:2px">ディレクター</div>
              </div>`).join('')}
          </div>` : ''}
        </div>`;
    });
    body.innerHTML = html;
    return;
  }

  // 一覧表ビュー
  if (key === "list") {
    const deptColors = {
      "経営": "#1d1d1f", "人事部": "#7c5cfc", "CS事業部": "#30b050",
      "YT第1営業部": "#f59e0b", "YT第2営業部": "#0a84ff",
      "YT第3営業部": "#30b050", "YT第4営業部": "#7c5cfc", "品質管理部": "#ef4444"
    };
    html += `<div style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,.07)">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:#f5f5f7;border-bottom:1px solid rgba(0,0,0,.07)">
            <th style="padding:.75rem 1rem;text-align:left;font-weight:600;color:#1d1d1f;font-size:11px;letter-spacing:.05em">氏名</th>
            <th style="padding:.75rem 1rem;text-align:left;font-weight:600;color:#1d1d1f;font-size:11px;letter-spacing:.05em">部署</th>
            <th style="padding:.75rem 1rem;text-align:left;font-weight:600;color:#1d1d1f;font-size:11px;letter-spacing:.05em">役職</th>
            <th style="padding:.75rem 1rem;text-align:left;font-weight:600;color:#1d1d1f;font-size:11px;letter-spacing:.05em">区分</th>
          </tr>
        </thead>
        <tbody>`;
    allMembers.forEach((m, i) => {
      const c = deptColors[m.dept] || "#888";
      const isExec = m.level === "exec";
      html += `<tr style="border-bottom:1px solid rgba(0,0,0,.05);${i%2===0?'':'background:#fafafa'}">
        <td style="padding:.7rem 1rem;font-weight:500;color:#1d1d1f">${m.name}</td>
        <td style="padding:.7rem 1rem">
          <span style="display:inline-flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>
            <span style="color:#6e6e73;font-size:12px">${m.dept}</span>
          </span>
        </td>
        <td style="padding:.7rem 1rem;color:#6e6e73;font-size:12px">${m.role}</td>
        <td style="padding:.7rem 1rem">
          <span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:${isExec?c+'22':'#f0f0f0'};color:${isExec?c:'#888'}">${isExec?'管理職':'ディレクター'}</span>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    body.innerHTML = html;
    return;
  }

  // トップカード
  if (dept.top) {
    html += `<div class="org-top">
      <div class="org-top-avatar">👤</div>
      <div>
        <div class="org-top-name">${dept.top.name}</div>
        <div class="org-top-role">${dept.top.role}</div>
      </div>
    </div>`;
  }

  // 部門ごと
  dept.depts.forEach(d => {
    html += `<div class="org-sub-section">
      <div class="org-dept-header">
        <div class="org-dept-bar" style="background:${d.color}"></div>
        <div class="org-dept-name">${d.name}</div>
      </div>
      <div class="org-grid">`;
    d.members.forEach(m => {
      const isExec = m.level === "exec";
      const badgeColor = isExec ? d.color : '#aeaeb2';
      const badgeText = isExec ? "管理職" : "ディレクター";
      html += `<div class="org-card ${isExec ? 'exec' : ''}" style="--dept-color:${d.color}">
        <div class="org-card-name">${m.name}</div>
        <div class="org-card-role">${m.role}</div>
        <span class="org-card-badge" style="background:${badgeColor}22;color:${badgeColor}">${badgeText}</span>
      </div>`;
    });
    html += `</div></div>`;
  });

  body.innerHTML = html;
}

let currentNoticeFilter = "all";

function openNotice() {
  document.getElementById("noticeModal").classList.add("open");
  document.getElementById("noticeOverlay").classList.add("open");
  renderNotice();
}

function closeNotice() {
  document.getElementById("noticeModal").classList.remove("open");
  document.getElementById("noticeOverlay").classList.remove("open");
}

function filterNotice(tag, el) {
  currentNoticeFilter = tag;
  document.querySelectorAll(".notice-filter-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderNotice();
}

function renderNotice() {
  const body = document.getElementById("noticeBody");
  let items = noticeData;
  if (currentNoticeFilter !== "all") {
    items = items.filter(n => n.tag === currentNoticeFilter);
  }
  // ピン留め → 新しい順
  const pinned = items.filter(n => n.pinned);
  const others = items.filter(n => !n.pinned);

  body.innerHTML = [...pinned, ...others].map(n => `
    <div class="notice-card ${n.pinned ? 'pinned' : ''}">
      <div class="notice-card-top">
        ${n.pinned ? '<span class="notice-pin-icon">📌</span>' : ''}
        <span class="notice-tag" style="background:${n.tagColor}22;color:${n.tagColor}">${n.tag}</span>
        <span class="notice-date">${n.date}</span>
      </div>
      <div class="notice-title">${n.title}</div>
      <div class="notice-body-text">${n.body}</div>
    </div>
  `).join('');
}
